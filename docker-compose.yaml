version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: xupay_registry_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: xupay_registry_db
    ports:
      - "5010:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: